
<div id="games"></div>

<script>

async function loadGames() {

  try {

    const url =
      "https://icy-pond-784c.cozyanimecookie.workers.dev/";

    const response =
      await fetch(url);

    const data =
      await response.json();

    console.log(data);

    const games =
      data.response?.games || [];

    const container =
      document.getElementById("games");

    container.innerHTML = "";

    if (games.length === 0) {

      container.innerHTML =
        "<p>No games found.</p>";

      return;
    }

    games.sort((a, b) =>
      a.name.localeCompare(b.name)
    );

    games.forEach(game => {

      const image =
        `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

      container.innerHTML += `

        <div class="game">

          <img src="${image}" loading="lazy">

          <div class="title">
            ${game.name}
          </div>

        </div>
      `;
    });

  } catch(error) {

    console.error(error);

    document.getElementById("games").innerHTML =
      `<p>Error loading games: ${error}</p>`;
  }
}

loadGames();

</script>
