<div id="games"></div>
<script>

async function loadGames() {

  const url =
    "https://icy-pond-784c.cozyanimecookie.workers.dev/";

  const response =
    await fetch(url);

  const data =
    await response.json();

  const games =
    data.response.games;

  const container =
    document.getElementById("games");

  container.innerHTML = "";

  games.sort((a, b) =>
    a.name.localeCompare(b.name)
  );

  games.forEach(game => {

    const image =
            `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

    container.innerHTML += `

      <div class="game">

        <img src="${image}">

        <div class="title">
          ${game.name}
        </div>

      </div>
    `;
  });
}

loadGames();

</script>
