<!DOCTYPE html>
<html>
<head>
  <title>My Steam Library</title>

  <style>
    body {
      background: #111827;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .game {
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .game:hover {
      transform: scale(1.03);
    }

    .game img {
      width: 100%;
      display: block;
    }

    .title {
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>My Steam Library</h1>

<div id="games"></div>

<script>
const API_KEY = "10E1C81C19286DA080970E851E8EBAE4";
const STEAM_ID = "76561198129919221";

async function loadGames() {

  const url =
    `https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${API_KEY}&steamid=${STEAM_ID}&include_appinfo=true`;

  const response = await fetch(url);
  const data = await response.json();

  const games = data.response.games;

  games.sort((a, b) =>
    a.name.localeCompare(b.name)
  );

  const container = document.getElementById("games");

  container.innerHTML = "";

  games.forEach(game => {

    const image =
      `https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;

    container.innerHTML += `
      <div class="game">
        <img src="${image}">
        <div class="title">${game.name}</div>
      </div>
    `;
  });
}

loadGames();
</script>

</body>
</html><!DOCTYPE html>
