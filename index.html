<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CozyAnimeCookie Library</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

font-family:"Comic Sans MS",cursive;

color:white;

overflow-x:hidden;

background:
radial-gradient(
circle at center,
#6727b8 0%,
#2a1245 40%,
#000000 100%
);

min-height:100vh;
}

/* STARS */

.stars{

position:fixed;

width:100%;

height:100%;

top:0;

left:0;

z-index:0;

pointer-events:none;
}

.star{

position:absolute;

border-radius:50%;

animation:twinkle linear infinite;
}

@keyframes twinkle{

0%{
opacity:0.2;
transform:scale(0.5);
}

50%{
opacity:1;
transform:scale(1.4);
}

100%{
opacity:0.2;
transform:scale(0.5);
}
}

/* LAYOUT */

.container{

position:relative;

z-index:2;

padding:30px;
}

h1{

text-align:center;

font-size:58px;

margin-bottom:12px;

text-shadow:
0 0 12px #ffb6ff,
0 0 24px #d8b4fe;
}

.subtitle{

text-align:center;

margin-bottom:50px;

font-size:20px;

color:#ffe9ff;
}

.layout{

display:grid;

grid-template-columns:260px 1fr;

gap:25px;
}

/* SIDEBAR */

.sidebar{

background:
rgba(255,255,255,0.08);

border-radius:28px;

padding:24px;

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,0.12);
}

.hat{

font-size:70px;

text-align:center;

margin-bottom:10px;
}

.sidebar-title{

text-align:center;

font-size:34px;

margin-bottom:24px;
}

.menu{

background:
rgba(255,255,255,0.08);

padding:14px;

border-radius:16px;

margin-bottom:12px;
}

/* MAIN */

.section{

margin-bottom:60px;
}

.section-title{

font-size:34px;

margin-bottom:20px;

text-shadow:
0 0 10px #d8b4fe;
}

.game-grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(240px,1fr));

gap:20px;
}

/* CARDS */

.game-card{

background:
linear-gradient(
180deg,
rgba(255,255,255,0.12),
rgba(92,34,150,0.88)
);

border-radius:24px;

overflow:hidden;

border:
1px solid rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

transition:0.25s;
}

.game-card:hover{

transform:
translateY(-6px)
scale(1.03);
}

.game-card img{

width:100%;

display:block;
}

.game-info{

padding:16px;
}

.game-title{

font-size:18px;

margin-bottom:12px;
}

.tag{

display:inline-block;

background:
rgba(255,255,255,0.12);

padding:6px 10px;

border-radius:12px;

font-size:13px;

margin-bottom:12px;
}

textarea{

width:100%;

min-height:80px;

margin-top:14px;

border:none;

border-radius:14px;

padding:12px;

background:
rgba(0,0,0,0.35);

color:white;

font-family:
"Comic Sans MS",cursive;
}

select{

width:100%;

padding:10px;

margin-top:10px;

border-radius:12px;

border:none;

background:
rgba(0,0,0,0.4);

color:white;
}

label{

display:block;

margin-top:12px;
}

.stars-rating{

margin-top:12px;

font-size:22px;
}

.star-rating{

cursor:pointer;

opacity:0.3;
}

@media(max-width:900px){

.layout{

grid-template-columns:1fr;
}

h1{

font-size:42px;
}
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h1>🌙 Cozy Anime Cookie Library ✨</h1>

<div class="subtitle">
Every game is a magical adventure 💖
</div>

<div class="layout">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="hat">🧙‍♀️</div>

<div class="sidebar-title">
SPELLBOOK
</div>

<div class="menu">📚 All Games</div>

<div class="menu">⭐ Favorites</div>

<div class="menu">🎮 Currently Playing</div>

<div class="menu">📝 Notes</div>

</aside>

<!-- MAIN -->

<main>

<section class="section">

<div class="section-title">
⭐ Favorites
</div>

<div class="game-grid favorites-grid"></div>

</section>

<section class="section">

<div class="section-title">
🎮 Currently Playing
</div>

<div class="game-grid playing-grid"></div>

</section>

<section class="section">

<div class="section-title">
📚 All Games
</div>

<div class="game-grid all-games-grid"></div>

</section>

</main>

</div>

</div>

<script>

/* STARS */

const stars =
document.getElementById("stars");

for(let i=0;i<180;i++){

const star =
document.createElement("div");

star.className="star";

const size =
Math.random()*4+1;

star.style.width=
size+"px";

star.style.height=
size+"px";

star.style.left=
Math.random()*100+"%";

star.style.top=
Math.random()*100+"%";

star.style.animationDuration=
(2+Math.random()*5)+"s";

const colors=[
"#ffffff",
"#fff7b0",
"#ffe680"
];

star.style.background=
colors[
Math.floor(
Math.random()*colors.length
)
];

stars.appendChild(star);
}

/* LOAD GAMES */

async function loadGames(){

const workerURL =
"https://icy-pond-784c.cozyanimecookie.workers.dev/";

try{

const response =
await fetch(workerURL);

const data =
await response.json();

const games =
data.response.games || [];

const allGrid =
document.querySelector(".all-games-grid");

games.sort((a,b)=>
a.name.localeCompare(b.name)
);

games.forEach(game=>{

const image =
`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

const card =
document.createElement("div");

card.className =
"game-card";

card.innerHTML=`

<img src="${image}">

<div class="game-info">

<div class="game-title">
${game.name}
</div>

<div class="tag">
Steam Game
</div>

<div class="stars-rating">
⭐⭐⭐⭐⭐
</div>

<textarea
placeholder="Magical cozy notes..."
></textarea>

</div>
`;

allGrid.appendChild(card);
});

}catch(error){

console.error(error);
}
}

loadGames();

</script>

</body>

</html>
