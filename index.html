<script>

/* ======================================
   TWINKLE STARS
====================================== */

const starsContainer =
document.getElementById("stars");

for(let i = 0; i < 180; i++){

const star =
document.createElement("div");

star.className = "star";

const size =
Math.random() * 4 + 1;

star.style.width =
size + "px";

star.style.height =
size + "px";

star.style.left =
Math.random() * 100 + "%";

star.style.top =
Math.random() * 100 + "%";

star.style.animationDuration =
(2 + Math.random() * 5) + "s";

star.style.animationDelay =
Math.random() * 5 + "s";

const colors = [
"#ffffff",
"#fff7b0",
"#ffe680"
];

star.style.background =
colors[
Math.floor(
Math.random() * colors.length
)
];

starsContainer.appendChild(star);

}

/* ======================================
   SIDEBAR FILTER BUTTONS
====================================== */

let currentFilter = "all";

document.querySelectorAll(".menu")
.forEach(button=>{

button.addEventListener(
"click",
()=>{

document.querySelectorAll(".menu")
.forEach(btn=>{

btn.classList.remove("active-menu");

});

button.classList.add("active-menu");

currentFilter =
button.dataset.filter;

loadGames();

}
);

});

/* ======================================
   LOAD GAMES
====================================== */

async function loadGames(){

const workerURL =
"https://icy-pond-784c.cozyanimecookie.workers.dev/";

try{

const response =
await fetch(workerURL);

const data =
await response.json();

const games =
data.response.games || [];

const allGrid =
document.querySelector(
".all-games-grid"
);

allGrid.innerHTML = "";

games.sort((a,b)=>
a.name.localeCompare(b.name)
);

games.forEach(game=>{

const image =
`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

const gameKey =
`game_${game.appid}`;

const savedCategory =
localStorage.getItem(
`${gameKey}_category`
) || "Story Driven / Visual Novel";

const savedPlaying =
localStorage.getItem(
`${gameKey}_playing`
) === "true";

const savedCompleted =
localStorage.getItem(
`${gameKey}_completed`
) === "true";

const savedRating =
localStorage.getItem(
`${gameKey}_rating`
) || "0";

const savedNotes =
localStorage.getItem(
`${gameKey}_notes`
) || "";

const savedMonth =
localStorage.getItem(
`${gameKey}_month`
) || "";

const savedYear =
localStorage.getItem(
`${gameKey}_year`
) || "";

if(
currentFilter === "playing"
&& !savedPlaying
){
return;
}

if(
currentFilter === "completed"
&& !savedCompleted
){
return;
}

if(
currentFilter === "notes"
&& savedNotes.trim() === ""
){
return;
}

const card =
createCard(
game,
image,
savedCategory,
savedPlaying,
savedCompleted,
savedRating,
savedNotes,
savedMonth,
savedYear,
gameKey
);

allGrid.appendChild(card);

});

}catch(error){

console.error(error);

}

}

/* ======================================
   CREATE CARD
====================================== */

function createCard(
game,
image,
savedCategory,
savedPlaying,
savedCompleted,
savedRating,
savedNotes,
savedMonth,
savedYear,
gameKey
){

const card =
document.createElement("div");

card.className =
"game-card";

if(savedCompleted){

card.style.background =
"linear-gradient(180deg,#1a1a1a,#000000)";

}

card.innerHTML = `

<img src="${image}">

<div class="game-info">

<div class="game-title">
${game.name}
</div>

<select class="category-select">

<option
value="Story Driven / Visual Novel"
${savedCategory === "Story Driven / Visual Novel" ? "selected" : ""}
>
Story Driven / Visual Novel
</option>

<option
value="CozyAdventure"
${savedCategory === "CozyAdventure" ? "selected" : ""}
>
CozyAdventure
</option>

<option
value="CozyHorror"
${savedCategory === "CozyHorror" ? "selected" : ""}
>
CozyHorror
</option>

<option
value="CozyCasual"
${savedCategory === "CozyCasual" ? "selected" : ""}
>
CozyCasual
</option>

<option
value="Multiplayer / CO-OP"
${savedCategory === "Multiplayer / CO-OP" ? "selected" : ""}
>
Multiplayer / CO-OP
</option>

</select>

<label>

<input
type="checkbox"
class="playing-toggle"
${savedPlaying ? "checked" : ""}
>

🎮 Currently Playing

</label>

<label>

<input
type="checkbox"
class="completed-toggle"
${savedCompleted ? "checked" : ""}
>

✔ Completed

</label>

<div class="completion-date">

<select class="month-select">

<option value="">
Month
</option>

<option ${savedMonth==="January"?"selected":""}>
January
</option>

<option ${savedMonth==="February"?"selected":""}>
February
</option>

<option ${savedMonth==="March"?"selected":""}>
March
</option>

<option ${savedMonth==="April"?"selected":""}>
April
</option>

<option ${savedMonth==="May"?"selected":""}>
May
</option>

<option ${savedMonth==="June"?"selected":""}>
June
</option>

<option ${savedMonth==="July"?"selected":""}>
July
</option>

<option ${savedMonth==="August"?"selected":""}>
August
</option>

<option ${savedMonth==="September"?"selected":""}>
September
</option>

<option ${savedMonth==="October"?"selected":""}>
October
</option>

<option ${savedMonth==="November"?"selected":""}>
November
</option>

<option ${savedMonth==="December"?"selected":""}>
December
</option>

</select>

<select class="year-select">

<option value="">
Year
</option>

<option ${savedYear==="2024"?"selected":""}>
2024
</option>

<option ${savedYear==="2025"?"selected":""}>
2025
</option>

<option ${savedYear==="2026"?"selected":""}>
2026
</option>

<option ${savedYear==="2027"?"selected":""}>
2027
</option>

<option ${savedYear==="2028"?"selected":""}>
2028
</option>

</select>

</div>

<div class="stars-rating">

<span class="star-rating" data-value="1">⭐</span>
<span class="star-rating" data-value="2">⭐</span>
<span class="star-rating" data-value="3">⭐</span>
<span class="star-rating" data-value="4">⭐</span>
<span class="star-rating" data-value="5">⭐</span>

</div>

<textarea
class="notes-box"
placeholder="Magical cozy notes..."
>${savedNotes}</textarea>

</div>
`;

/* CATEGORY */

const categorySelect =
card.querySelector(
".category-select"
);

categorySelect.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_category`,
categorySelect.value
);

}
);

/* PLAYING */

const playingToggle =
card.querySelector(
".playing-toggle"
);

playingToggle.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_playing`,
playingToggle.checked
);

}
);

/* COMPLETED */

const completedToggle =
card.querySelector(
".completed-toggle"
);

completedToggle.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_completed`,
completedToggle.checked
);

if(completedToggle.checked){

card.style.background =
"linear-gradient(180deg,#1a1a1a,#000000)";

}else{

card.style.background =
"linear-gradient(180deg,rgba(255,255,255,0.12),rgba(92,34,150,0.9))";

}

}
);

/* MONTH */

const monthSelect =
card.querySelector(
".month-select"
);

monthSelect.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_month`,
monthSelect.value
);

}
);

/* YEAR */

const yearSelect =
card.querySelector(
".year-select"
);

yearSelect.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_year`,
yearSelect.value
);

}
);

/* NOTES */

const notesBox =
card.querySelector(
".notes-box"
);

notesBox.addEventListener(
"input",
()=>{

localStorage.setItem(
`${gameKey}_notes`,
notesBox.value
);

}
);

/* STARS */

const stars =
card.querySelectorAll(
".star-rating"
);

function updateStars(value){

stars.forEach(star=>{

star.style.opacity =
star.dataset.value <= value
? "1"
: "0.3";

});

}

updateStars(savedRating);

stars.forEach(star=>{

star.addEventListener(
"click",
()=>{

const value =
star.dataset.value;

localStorage.setItem(
`${gameKey}_rating`,
value
);

updateStars(value);

}
);

});

return card;

}

/* ======================================
   START APP
====================================== */

loadGames();

</script>
