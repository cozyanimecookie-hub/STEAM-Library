<!DOCTYPE html>
<html>

<head>

  <title>Steam Library</title>
  
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
  
  <style>

    body {
      background: #111827;
      color: white;
      font-family: "Trebuchet MS", sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
  text-align: center;
  margin-bottom: 30px;
  font-family: 'Fredoka', sans-serif;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .game {
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .game:hover {
      transform: scale(1.03);
    }

    .game img {
      width: 100%;
      display: block;
    }

    .title {
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }

    .controls {
  padding: 12px;
}

.game-check {
  margin-right: 8px;
}

textarea {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  padding: 8px;
  resize: vertical;
  min-height: 80px;
  font-family: Arial;
}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
    
  </style>

</head>

<body>

  <h1>My Steam Library</h1>

  <div id="games"></div>

  <script>

    async function loadGames() {

      try {

        const url =
          "https://icy-pond-784c.cozyanimecookie.workers.dev/";

        const response =
          await fetch(url);

        const data =
          await response.json();

        console.log(data);

        const games =
          data.response.games || [];

        const container =
          document.getElementById("games");

        container.innerHTML = "";

        games.sort((a, b) =>
          a.name.localeCompare(b.name)
        );

        games.forEach(game => {

          const image =
            `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

          const card = document.createElement("div");

          card.className = "game";

          const gameKey =
  `game_${game.appid}`;

const savedChecked =
  localStorage.getItem(gameKey + "_checked") === "true";

const savedNotes =
  localStorage.getItem(gameKey + "_notes") || "";

card.innerHTML = `

  const gameKey =
  `game_${game.appid}`;

const savedChecked =
  localStorage.getItem(gameKey + "_checked") === "true";

const savedNotes =
  localStorage.getItem(gameKey + "_notes") || "";

const savedPlaying =
  localStorage.getItem(gameKey + "_playing") === "true";

const savedCategory =
  localStorage.getItem(gameKey + "_category") || "Backlog";

const savedRating =
  localStorage.getItem(gameKey + "_rating") || "0";

card.innerHTML = `

  <img src="${image}" loading="lazy">

  <div class="title">
    ${game.name}
  </div>

  <div class="controls">

    <label class="witch-label">

      <input
        type="checkbox"
        class="game-check"
        data-appid="${game.appid}"
        ${savedChecked ? "checked" : ""}
      >

      Completed

    </label>

    <label class="witch-label">

      <input
        type="checkbox"
        class="playing-check"
        data-appid="${game.appid}"
        ${savedPlaying ? "checked" : ""}
      >

      Currently Playing

    </label>

    <select
      class="category-select"
      data-appid="${game.appid}"
    >

      <option ${savedCategory === "Backlog" ? "selected" : ""}>
        Backlog
      </option>

      <option ${savedCategory === "Cozy" ? "selected" : ""}>
        Cozy
      </option>

      <option ${savedCategory === "Horror" ? "selected" : ""}>
        Horror
      </option>

      <option ${savedCategory === "RPG" ? "selected" : ""}>
        RPG
      </option>

      <option ${savedCategory === "Multiplayer" ? "selected" : ""}>
        Multiplayer
      </option>

      <option ${savedCategory === "Completed" ? "selected" : ""}>
        Completed
      </option>

    </select>

    <div class="rating">

      <span class="star" data-value="1">⭐</span>
      <span class="star" data-value="2">⭐</span>
      <span class="star" data-value="3">⭐</span>
      <span class="star" data-value="4">⭐</span>
      <span class="star" data-value="5">⭐</span>

    </div>

    <textarea
      class="game-notes"
      data-appid="${game.appid}"
      placeholder="Potion notes..."
    >${savedNotes}</textarea>

  </div>
`;

          container.appendChild(card);

          const checkbox =
  card.querySelector(".game-check");

checkbox.addEventListener("change", () => {

  localStorage.setItem(
    `game_${game.appid}_checked`,
    checkbox.checked
  );
});

const notes =
  card.querySelector(".game-notes");

notes.addEventListener("input", () => {

  localStorage.setItem(
    `game_${game.appid}_notes`,
    notes.value
  );
});
        });

      } catch(error) {

        console.error(error);

        document.getElementById("games").innerHTML =
          `<p>Error loading games.</p>`;
      }
    }

    loadGames();

  </script>

</body>

</html>
