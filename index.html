<script>

  /* =========================================
     TWINKLE STAR BACKGROUND
  ========================================= */

  const starsContainer =
    document.getElementById("stars");

  for (let i = 0; i < 180; i++) {

    const star =
      document.createElement("div");

    star.className = "star";

    const size =
      Math.random() * 4 + 1;

    star.style.width =
      size + "px";

    star.style.height =
      size + "px";

    star.style.left =
      Math.random() * 100 + "%";

    star.style.top =
      Math.random() * 100 + "%";

    star.style.animationDuration =
      (2 + Math.random() * 5) + "s";

    star.style.animationDelay =
      Math.random() * 5 + "s";

    const colors = [
      "#ffffff",
      "#fff7b0",
      "#ffe680"
    ];

    star.style.background =
      colors[
        Math.floor(
          Math.random() * colors.length
        )
      ];

    starsContainer.appendChild(star);
  }

  /* =========================================
     LOAD STEAM LIBRARY
  ========================================= */

  async function loadSteamGames() {

    /* INSERT YOUR REAL CLOUDFLARE WORKER URL */

    const workerURL =
      "https://icy-pond-784c.cozyanimecookie.workers.dev/";

    try {

      const response =
        await fetch(workerURL);

      const data =
        await response.json();

      const games =
        data.response.games || [];

      /* =========================================
         FIND PAGE SECTIONS
      ========================================= */

      const favoritesGrid =
        document.querySelector(
          ".favorites-grid"
        );

      const playingGrid =
        document.querySelector(
          ".playing-grid"
        );

      const allGamesGrid =
        document.querySelector(
          ".all-games-grid"
        );

      /* SAFETY CHECK */

      if (
        !favoritesGrid ||
        !playingGrid ||
        !allGamesGrid
      ) {

        console.error(
          "Missing required grid sections."
        );

        return;
      }

      /* CLEAR OLD CONTENT */

      favoritesGrid.innerHTML = "";

      playingGrid.innerHTML = "";

      allGamesGrid.innerHTML = "";

      /* SORT GAMES */

      games.sort((a, b) =>
        a.name.localeCompare(b.name)
      );

      /* =========================================
         CREATE GAME CARDS
      ========================================= */

      games.forEach(game => {

        const image =
          `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

        const gameKey =
          `game_${game.appid}`;

        /* SAVED SETTINGS */

        const savedNotes =
          localStorage.getItem(
            `${gameKey}_notes`
          ) || "";

        const savedRating =
          localStorage.getItem(
            `${gameKey}_rating`
          ) || "0";

        const savedFavorite =
          localStorage.getItem(
            `${gameKey}_favorite`
          ) === "true";

        const savedPlaying =
          localStorage.getItem(
            `${gameKey}_playing`
          ) === "true";

        const savedCategory =
          localStorage.getItem(
            `${gameKey}_category`
          ) || "Backlog";

        /* CREATE CARD */

        const card =
          document.createElement("div");

        card.className =
          "game-card";

        card.innerHTML = `

          <img
            src="${image}"
            loading="lazy"
          >

          <div class="game-info">

            <div class="game-title">
              ${game.name}
            </div>

            <div class="tags">

              <div class="tag">
                ${savedCategory}
              </div>

            </div>

            <label class="witch-label">

              <input
                type="checkbox"
                class="favorite-toggle"
                ${savedFavorite ? "checked" : ""}
              >

              ⭐ Favorite

            </label>

            <label class="witch-label">

              <input
                type="checkbox"
                class="playing-toggle"
                ${savedPlaying ? "checked" : ""}
              >

              🎮 Currently Playing

            </label>

            <select class="category-select">

              <option
                ${savedCategory === "Backlog" ? "selected" : ""}
              >
                Backlog
              </option>

              <option
                ${savedCategory === "Cozy" ? "selected" : ""}
              >
                Cozy
              </option>

              <option
                ${savedCategory === "RPG" ? "selected" : ""}
              >
                RPG
              </option>

              <option
                ${savedCategory === "Horror" ? "selected" : ""}
              >
                Horror
              </option>

              <option
                ${savedCategory === "Multiplayer" ? "selected" : ""}
              >
                Multiplayer
              </option>

            </select>

            <div class="stars-rating">

              <span class="star-rating" data-value="1">⭐</span>
              <span class="star-rating" data-value="2">⭐</span>
              <span class="star-rating" data-value="3">⭐</span>
              <span class="star-rating" data-value="4">⭐</span>
              <span class="star-rating" data-value="5">⭐</span>

            </div>

            <textarea
              class="notes-box"
              placeholder="Magical cozy notes..."
            >${savedNotes}</textarea>

          </div>
        `;

        /* =========================================
           ADD TO ALL GAMES
        ========================================= */

        allGamesGrid.appendChild(card);

        /* =========================================
           FAVORITES SHELF
        ========================================= */

        if (savedFavorite) {

          const favoriteClone =
            card.cloneNode(true);

          favoritesGrid.appendChild(
            favoriteClone
          );
        }

        /* =========================================
           CURRENTLY PLAYING SHELF
        ========================================= */

        if (savedPlaying) {

          const playingClone =
            card.cloneNode(true);

          playingGrid.appendChild(
            playingClone
          );
        }

        /* =========================================
           SAVE NOTES
        ========================================= */

        const notesBox =
          card.querySelector(
            ".notes-box"
          );

        notesBox.addEventListener(
          "input",
          () => {

            localStorage.setItem(
              `${gameKey}_notes`,
              notesBox.value
            );
          }
        );

        /* =========================================
           SAVE CATEGORY
        ========================================= */

        const categorySelect =
          card.querySelector(
            ".category-select"
          );

        categorySelect.addEventListener(
          "change",
          () => {

            localStorage.setItem(
              `${gameKey}_category`,
              categorySelect.value
            );

            location.reload();
          }
        );

        /* =========================================
           FAVORITES TOGGLE
        ========================================= */

        const favoriteToggle =
          card.querySelector(
            ".favorite-toggle"
          );

        favoriteToggle.addEventListener(
          "change",
          () => {

            localStorage.setItem(
              `${gameKey}_favorite`,
              favoriteToggle.checked
            );

            location.reload();
          }
        );

        /* =========================================
           CURRENTLY PLAYING TOGGLE
        ========================================= */

        const playingToggle =
          card.querySelector(
            ".playing-toggle"
          );

        playingToggle.addEventListener(
          "change",
          () => {

            localStorage.setItem(
              `${gameKey}_playing`,
              playingToggle.checked
            );

            location.reload();
          }
        );

        /* =========================================
           STAR RATINGS
        ========================================= */

        const stars =
          card.querySelectorAll(
            ".star-rating"
          );

        function updateStars(value) {

          stars.forEach(star => {

            star.style.opacity =
              star.dataset.value <= value
              ? "1"
              : "0.3";
          });
        }

        updateStars(savedRating);

        stars.forEach(star => {

          star.addEventListener(
            "click",
            () => {

              const value =
                star.dataset.value;

              localStorage.setItem(
                `${gameKey}_rating`,
                value
              );

              updateStars(value);
            }
          );
        });
      });

    } catch(error) {

      console.error(
        "Steam Library Error:",
        error
      );
    }
  }

  loadSteamGames();

</script>
