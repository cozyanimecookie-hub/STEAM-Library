<!DOCTYPE html>
<html>

<head>

  <title> CozyAnimeCookie's Steam Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

  <style>

    body {

      background:
        radial-gradient(circle at top, #2d1b4e, #0f0f1a);

      color: #f3e8ff;

      font-family: Arial, sans-serif;

      padding: 20px;

      margin: 0;
    }

    h1 {

      text-align: center;

      font-family: 'Cinzel', serif;

      color: #e9d5ff;

      font-size: 48px;

      text-shadow: 0 0 12px #9333ea;

      margin-bottom: 40px;
    }

    #games {

      display: grid;

      grid-template-columns:
        repeat(auto-fill, minmax(260px, 1fr));

      gap: 24px;
    }

    .game {

      background: rgba(35, 20, 50, 0.95);

      border-radius: 16px;

      overflow: hidden;

      border: 1px solid #7e22ce;

      box-shadow:
        0 0 20px rgba(168, 85, 247, 0.25);

      transition: transform 0.2s;
    }

    .game:hover {
      transform: scale(1.02);
    }

    .game img {

      width: 100%;

      display: block;
    }

    .title {

      padding: 14px;

      text-align: center;

      font-size: 16px;

      color: #f5d0fe;

      font-weight: bold;
    }

    .controls {

      padding: 14px;
    }

    .witch-label {

      display: block;

      margin-bottom: 12px;
    }

    textarea {

      width: 100%;

      min-height: 80px;

      background: #1e1b2e;

      color: white;

      border: 1px solid #9333ea;

      border-radius: 10px;

      padding: 10px;

      margin-top: 10px;

      resize: vertical;
    }

    select {

      width: 100%;

      margin-top: 10px;

      background: #1e1b2e;

      color: white;

      border: 1px solid #9333ea;

      border-radius: 10px;

      padding: 10px;
    }

    .rating {

      margin-top: 12px;

      font-size: 22px;
    }

    .star {

      cursor: pointer;

      opacity: 0.3;
    }

    .star.active {
      opacity: 1;
    }

  </style>

</head>

<body>

  <h1>🔮 Witchy Steam Library 🔮</h1>

  <div id="games"></div>

  <script>

    async function loadGames() {

      try {

        const url =
          "https://icy-pond-784c.cozyanimecookie.workers.dev/";

        const response =
          await fetch(url);

        const data =
          await response.json();

        const games =
          data.response.games || [];

        const container =
          document.getElementById("games");

        container.innerHTML = "";

        games.sort((a, b) =>
          a.name.localeCompare(b.name)
        );

        games.forEach(game => {

          const image =
            `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

          const gameKey =
            `game_${game.appid}`;

          const savedChecked =
            localStorage.getItem(gameKey + "_checked") === "true";

          const savedPlaying =
            localStorage.getItem(gameKey + "_playing") === "true";

          const savedNotes =
            localStorage.getItem(gameKey + "_notes") || "";

          const savedCategory =
            localStorage.getItem(gameKey + "_category") || "Backlog";

          const savedRating =
            localStorage.getItem(gameKey + "_rating") || "0";

          const card =
            document.createElement("div");

          card.className = "game";

          card.innerHTML = `

            <img src="${image}" loading="lazy">

            <div class="title">
              ${game.name}
            </div>

            <div class="controls">

              <label class="witch-label">

                <input
                  type="checkbox"
                  class="game-check"
                  ${savedChecked ? "checked" : ""}
                >

                Completed

              </label>

              <label class="witch-label">

                <input
                  type="checkbox"
                  class="playing-check"
                  ${savedPlaying ? "checked" : ""}
                >

                Currently Playing

              </label>

              <select class="category-select">

                <option ${savedCategory === "Backlog" ? "selected" : ""}>
                  Backlog
                </option>

                <option ${savedCategory === "Cozy" ? "selected" : ""}>
                  Cozy
                </option>

                <option ${savedCategory === "RPG" ? "selected" : ""}>
                  RPG
                </option>

                <option ${savedCategory === "Horror" ? "selected" : ""}>
                  Horror
                </option>

                <option ${savedCategory === "Multiplayer" ? "selected" : ""}>
                  Multiplayer
                </option>

              </select>

              <div class="rating">

                <span class="star" data-value="1">⭐</span>
                <span class="star" data-value="2">⭐</span>
                <span class="star" data-value="3">⭐</span>
                <span class="star" data-value="4">⭐</span>
                <span class="star" data-value="5">⭐</span>

              </div>

              <textarea
                class="game-notes"
                placeholder="Potion notes..."
              >${savedNotes}</textarea>

            </div>
          `;

          container.appendChild(card);

          const checkbox =
            card.querySelector(".game-check");

          checkbox.addEventListener("change", () => {

            localStorage.setItem(
              `${gameKey}_checked`,
              checkbox.checked
            );
          });

          const playing =
            card.querySelector(".playing-check");

          playing.addEventListener("change", () => {

            localStorage.setItem(
              `${gameKey}_playing`,
              playing.checked
            );
          });

          const notes =
            card.querySelector(".game-notes");

          notes.addEventListener("input", () => {

            localStorage.setItem(
              `${gameKey}_notes`,
              notes.value
            );
          });

          const category =
            card.querySelector(".category-select");

          category.addEventListener("change", () => {

            localStorage.setItem(
              `${gameKey}_category`,
              category.value
            );
          });

          const stars =
            card.querySelectorAll(".star");

          function updateStars(value) {

            stars.forEach(star => {

              star.classList.toggle(
                "active",
                star.dataset.value <= value
              );
            });
          }

          updateStars(savedRating);

          stars.forEach(star => {

            star.addEventListener("click", () => {

              const value =
                star.dataset.value;

              localStorage.setItem(
                `${gameKey}_rating`,
                value
              );

              updateStars(value);
            });
          });
        });

      } catch(error) {

        console.error(error);

        document.getElementById("games").innerHTML =
          `<p>Error loading Steam library.</p>`;
      }
    }

    loadGames();

  </script>

</body>

</html>
