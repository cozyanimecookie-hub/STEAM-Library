<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6727b8">

<title>CozyAnimeCookie STEAM Library</title>

<style>

*{
box-sizing:border-box;
scroll-behavior:smooth;
font-family:"Comic Sans MS", cursive;
}

html,
body{
width:100%;
overflow-x:hidden;
}

body{

-webkit-text-size-adjust:100%;

font-family:
"Comic Sans MS",
"Chalkboard SE",
"Comic Neue",
cursive !important;

font-family:
"Comic Sans MS",
"Chalkboard SE",
"Comic Neue",
cursive;
margin:0;
font-family:"Comic Sans MS", cursive;
background:
radial-gradient(
circle at center,
#6727b8 0%,
#2b114a 45%,
#000000 100%
);
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* =========================
STARS
========================= */

.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
border-radius:50%;
animation:twinkle linear infinite;
}

@keyframes twinkle{
0%{opacity:0.2;transform:scale(0.5);}
50%{opacity:1;transform:scale(1.4);}
100%{opacity:0.2;transform:scale(0.5);}
}

/* =========================
FOG
========================= */

.fog{
position:fixed;
bottom:-40px;
left:0;
width:300%;
height:320px;
background:
radial-gradient(
circle,
rgba(216,180,254,0.28) 0%,
rgba(192,132,252,0.18) 35%,
rgba(255,255,255,0) 75%
);
filter:blur(18px);
opacity:0.7;
animation:fogMove 55s linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes fogMove{
0%{
transform:translateX(0) translateY(0);
}
50%{
transform:translateX(-20%) translateY(-10px);
}
100%{
transform:translateX(-40%) translateY(0);
}
}

/* =========================
MAIN
========================= */

.container{
position:relative;
z-index:2;
padding:30px;
}

h1{
text-align:center;
font-size:58px;
margin-bottom:10px;
text-shadow:
0 0 12px #f0abfc,
0 0 24px #d8b4fe;
}

.subtitle{
text-align:center;
font-size:20px;
margin-bottom:24px;
color:#ffe9ff;
}

/* =========================
ADMIN BUTTONS
========================= */

.admin-buttons{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:30px;
}

.admin-buttons button{
border:none;
padding:12px 18px;
border-radius:16px;
font-family:"Comic Sans MS", cursive;
font-size:16px;
cursor:pointer;
color:white;
background:
linear-gradient(
180deg,
#8b5cf6,
#4c1d95
);
box-shadow:
0 0 12px rgba(139,92,246,0.5);
transition:0.25s;
}

.admin-buttons button:hover{
transform:scale(1.05);
}

.admin-active{
background:
linear-gradient(
180deg,
#ffb347,
#ff7b00
) !important;
box-shadow:
0 0 18px rgba(255,140,0,0.9) !important;
}

/* =========================
STATS
========================= */

.stats-bar{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
margin-bottom:30px;
}

.stat-card{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:22px;
text-align:center;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.14);
}

.stat-number{
font-size:34px;
margin-bottom:8px;
}

/* =========================
LAYOUT
========================= */

.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:24px;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
background:rgba(255,255,255,0.08);
padding:22px;
border-radius:24px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.14);
height:fit-content;
}

.hat{
font-size:70px;
text-align:center;
margin-bottom:12px;
}

.sidebar-title{
text-align:center;
font-size:34px;
margin-bottom:22px;
}

.menu{
background:rgba(255,255,255,0.08);
padding:14px;
border-radius:16px;
margin-bottom:12px;
cursor:pointer;
transition:0.25s;
}

.menu:hover{
background:rgba(255,255,255,0.18);
transform:translateX(4px);
}

.active-menu{
background:rgba(255,255,255,0.28);
}

/* =========================
SEARCH
========================= */

.search-bar{
width:100%;
padding:14px;
border:none;
border-radius:18px;
margin-bottom:24px;
font-size:16px;
background:rgba(255,255,255,0.12);
color:white;
font-family:"Comic Sans MS", cursive;
outline:none;
border:1px solid rgba(255,255,255,0.15);
}

.search-bar::placeholder{
color:#f3d9ff;
}

/* =========================
GRID
========================= */

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

/* =========================
CARDS
========================= */

.game-card{
background:
linear-gradient(
180deg,
rgba(255,255,255,0.12),
rgba(92,34,150,0.9)
);
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.15);
transition:0.25s;
position:relative;
box-shadow:0 0 14px rgba(0,0,0,0.3);
}

.game-card:hover{
transform:translateY(-4px);
box-shadow:0 0 24px rgba(216,180,254,0.55);
}

.currently-playing{
background:
linear-gradient(
180deg,
rgba(34,197,94,0.35),
rgba(0,0,0,0.9)
) !important;
}

.currently-playing::before,
.currently-playing::after{
content:"🌿";
position:absolute;
font-size:28px;
animation:sway 5s ease-in-out infinite;
}

.currently-playing::before{
top:8px;
left:8px;
}

.currently-playing::after{
bottom:8px;
right:8px;
}

@keyframes sway{
0%{transform:rotate(-5deg);}
50%{transform:rotate(5deg);}
100%{transform:rotate(-5deg);}
}

.completed{
background:
linear-gradient(
180deg,
#1a1a1a,
#000000
) !important;
}

.game-card img{
width:100%;
display:block;
transition:0.3s;
}

.game-card:hover img{
filter:brightness(1.08);
}

.game-info{
padding:16px;
}

.game-title{
font-size:18px;
margin-bottom:14px;
}

select,
textarea,
button,
input{

font-family:
"Comic Sans MS",
"Chalkboard SE",
"Comic Neue",
cursive !important;

font-weight:normal !important;

accent-color:#ffffff;



font-family:
"Comic Sans MS",
"Chalkboard SE",
"Comic Neue",
cursive !important;

font-weight:normal !important;

-webkit-appearance:none;
width:100%;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.35);
color:white;
font-family:"Comic Sans MS", cursive;
margin-bottom:12px;
padding:12px;
}

textarea{
min-height:80px;
resize:vertical;
}

label{
display:block;
margin-bottom:12px;
}

.stars-rating{
font-size:24px;
margin-bottom:14px;
}

.star-rating{
cursor:pointer;
opacity:0.3;
transition:0.2s;
}

.star-rating:hover{
transform:scale(1.25);
}

/* =========================
TOP BUTTON
========================= */

#loadMoreBtn{

padding:12px 20px;

font-size:16px;

width:auto;

max-width:none;

}

#topButton{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:
linear-gradient(
180deg,
#8b5cf6,
#4c1d95
);
color:white;
font-size:28px;
cursor:pointer;
z-index:999;
box-shadow:0 0 20px rgba(139,92,246,0.8);
}

/* =========================
RESPONSIVE
========================= */

/* ======================================
RESPONSIVE
====================================== */

@media(max-width:1100px){

.layout{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
width:100%;
margin-bottom:24px;
}

.game-grid{
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
}

}

@media(max-width:700px){

.container{
padding:16px;
}

h1{
font-size:34px;
line-height:1.2;
}

.subtitle{
font-size:16px;
}

.layout{
grid-template-columns:1fr;
}

.sidebar{
padding:18px;
}

.sidebar-title{
font-size:26px;
}

.hat{
font-size:54px;
}

.menu{
font-size:16px;
padding:12px;
}

.stats-bar{
grid-template-columns:1fr;
}

.stat-card{
padding:14px;
}

.stat-number{
font-size:28px;
}

.game-grid{
grid-template-columns:1fr;
gap:18px;
}

.game-card{
border-radius:20px;
}

.game-title{
font-size:16px;
}

.search-bar{
font-size:16px;
padding:12px;
}

textarea,
select{
font-size:16px;
}

.admin-buttons{
flex-direction:column;
align-items:center;
}

.admin-buttons button{

width:auto;

max-width:none;

padding:10px 16px;

font-size:14px;
}

#topButton{
width:52px;
height:52px;
font-size:22px;
bottom:18px;
right:18px;
}

.star{
animation:none !important;
opacity:0.7;
}

.fog{
filter:blur(10px);
opacity:0.4;
}

}

h1{
font-size:42px;
}

}

</style>

</head>

<body>

<div class="stars" id="stars"></div>
<div class="fog"></div>

<button id="topButton">⬆</button>

<div class="container">

<h1>🌙 CozyAnimeCookie STEAM Library ✨</h1>

<div class="subtitle">
Every game is a magical adventure 💖
</div>

<div class="admin-buttons">
<button id="loginBtn">🔐 Admin Login</button>
<button id="logoutBtn">🚪 Logout</button>
</div>

<div class="stats-bar">

<div class="stat-card">
<div class="stat-number" id="totalGames">0</div>
🎮 Total Games
</div>

<div class="stat-card">
<div class="stat-number" id="completedGames">0</div>
✔ Completed
</div>

<div class="stat-card">
<div class="stat-number" id="playingGames">0</div>
🌿 Currently Playing
</div>

</div>

<div class="layout">

<aside class="sidebar">

<div class="hat">📖</div>

<div class="sidebar-title">
SPELLBOOK
</div>

<div class="menu active-menu" data-filter="all">📚 All Games</div>
<div class="menu" data-filter="playing">🌿 Currently Playing</div>
<div class="menu" data-filter="completed">✔ Completed</div>
<div class="menu" data-filter="CozyCasual">🫖 CozyCasual</div>
<div class="menu" data-filter="CozyAdventure">🌲 CozyAdventure</div>
<div class="menu" data-filter="CozyHorror">🕯️ CozyHorror</div>

</aside>

<main>

<input
class="search-bar"
id="searchBar"
placeholder="🔍 Search your magical library..."
type="text"
>

<div class="game-grid all-games-grid"></div>

<div style="text-align:center;margin-top:30px;">
<button id="loadMoreBtn" style="
padding:14px 24px;
border:none;
border-radius:18px;
background:linear-gradient(180deg,#8b5cf6,#4c1d95);
color:white;
font-family:'Comic Sans MS', cursive;
font-size:18px;
cursor:pointer;
box-shadow:0 0 18px rgba(139,92,246,0.6);
transition:0.25s;
">
✨ Load More Games ✨
</button>
</div>

</main>

</div>

</div>

<script>

/* =========================
ADMIN
========================= */

const ADMIN_PASSWORD = "@Cozyanimecookie";

const isAdmin =
localStorage.getItem("adminMode") === "true";

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

if(isAdmin){
loginBtn.classList.add("admin-active");
loginBtn.innerHTML = "☀️ Admin Active";
}

loginBtn.addEventListener("click",()=>{

const password = prompt("Enter Admin Password");

if(password === ADMIN_PASSWORD){
localStorage.setItem("adminMode","true");
location.reload();
}else{
alert("Wrong Password");
}

});

logoutBtn.addEventListener("click",()=>{
localStorage.removeItem("adminMode");
location.reload();
});

/* =========================
TOP BUTTON
========================= */

document.getElementById("topButton")
.addEventListener("click",()=>{
window.scrollTo({top:0,behavior:"smooth"});
});

/* =========================
SEARCH + FILTER
========================= */

let searchQuery = "";
let currentFilter = "all";
let visibleGames = 120;

const searchBar = document.getElementById("searchBar");
const loadMoreBtn = document.getElementById("loadMoreBtn");

searchBar.addEventListener("input",(e)=>{
searchQuery = e.target.value.toLowerCase();
visibleGames = 120;
loadGames();
});

loadMoreBtn.addEventListener("click",()=>{
visibleGames += 120;
loadGames();
});

const menuButtons = document.querySelectorAll(".menu");

menuButtons.forEach(button=>{

button.addEventListener("click",()=>{

menuButtons.forEach(btn=>{
btn.classList.remove("active-menu");
});

button.classList.add("active-menu");
currentFilter = button.dataset.filter;

loadGames();

});

});

/* =========================
STARS
========================= */

const stars = document.getElementById("stars");

for(let i=0;i<180;i++){

const star = document.createElement("div");
star.className = "star";

const size = Math.random()*5+1;

star.style.width = size+"px";
star.style.height = size+"px";
star.style.left = Math.random()*100+"%";
star.style.top = Math.random()*100+"%";
star.style.animationDuration = (1+Math.random()*4)+"s";
star.style.animationDelay = Math.random()*5+"s";
star.style.background = Math.random()>0.5
? "#ffffff"
: "#ffe680";

stars.appendChild(star);

}

/* =========================
LOAD GAMES
========================= */

async function loadGames(){

const workerURL =
"https://icy-pond-784c.cozyanimecookie.workers.dev/";

const response = await fetch(workerURL);
const data = await response.json();

let games = data.response.games || [];

const grid = document.querySelector(".all-games-grid");
grid.innerHTML = "";

if(searchQuery){
games = games.filter(game=>
game.name.toLowerCase().includes(searchQuery)
);
}

const allGames = [...games];

updateStats(allGames);

createGameCards(games.slice(0,visibleGames),grid);

if(visibleGames >= games.length){
loadMoreBtn.style.display = "none";
}else{
loadMoreBtn.style.display = "inline-block";
}

}

/* =========================
STATS
========================= */

function updateStats(games){

const completed = games.filter(game=>
localStorage.getItem(`game_${game.appid}_completed`) === "true"
).length;

const playing = games.filter(game=>
localStorage.getItem(`game_${game.appid}_playing`) === "true"
).length;

document.getElementById("totalGames").innerText = games.length;
document.getElementById("completedGames").innerText = completed;
document.getElementById("playingGames").innerText = playing;

}

/* =========================
CREATE CARDS
========================= */

function createGameCards(games,grid){

const filteredGames = games.filter(game=>{

const key = `game_${game.appid}`;

const playing =
localStorage.getItem(`${key}_playing`) === "true";

const completed =
localStorage.getItem(`${key}_completed`) === "true";

const category =
localStorage.getItem(`${key}_category`) || "";

if(currentFilter === "playing") return playing;
if(currentFilter === "completed") return completed;
if(currentFilter === "CozyCasual") return category === "CozyCasual";
if(currentFilter === "CozyAdventure") return category === "CozyAdventure";
if(currentFilter === "CozyHorror") return category === "CozyHorror";

return true;

});

filteredGames.forEach(game=>{
createCard(game,grid);
});

}

/* =========================
CARD
========================= */

function createCard(game,grid){

const key = `game_${game.appid}`;

const category = localStorage.getItem(`${key}_category`) || "";
const playing = localStorage.getItem(`${key}_playing`) === "true";
const completed = localStorage.getItem(`${key}_completed`) === "true";
const notes = localStorage.getItem(`${key}_notes`) || "";
const rating = localStorage.getItem(`${key}_rating`) || "0";

const image =
`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

const card = document.createElement("div");
card.className = "game-card";

if(playing) card.classList.add("currently-playing");
if(completed) card.classList.add("completed");

card.innerHTML = `

<img
loading="lazy"
src="${image}"
onerror="this.src='https://placehold.co/600x900/2b114a/ffffff?text=✨+Cozy+Game+✨'"
>

<div class="game-info">

<div class="game-title">${game.name}</div>

<select class="category-select">
<option value="">Select Category</option>
<option value="CozyCasual">🫖 CozyCasual</option>
<option value="CozyAdventure">🌲 CozyAdventure</option>
<option value="CozyHorror">🕯️ CozyHorror</option>
</select>

<label>
<input type="checkbox" class="playing-toggle" ${playing ? "checked" : ""}>
🌿 Currently Playing ${isAdmin ? "🔓" : "🔒"}
</label>

<label>
<input type="checkbox" class="completed-toggle" ${completed ? "checked" : ""}>
✔ Completed ${isAdmin ? "🔓" : "🔒"}
</label>

<div class="stars-rating">
<span class="star-rating" data-value="1">⭐</span>
<span class="star-rating" data-value="2">⭐</span>
<span class="star-rating" data-value="3">⭐</span>
<span class="star-rating" data-value="4">⭐</span>
<span class="star-rating" data-value="5">⭐</span>
</div>

<textarea class="notes-box" placeholder="Magical cozy notes...">${notes}</textarea>

</div>

`;

grid.appendChild(card);

const categorySelect = card.querySelector(".category-select");
const playingToggle = card.querySelector(".playing-toggle");
const completedToggle = card.querySelector(".completed-toggle");
const notesBox = card.querySelector(".notes-box");
const stars = card.querySelectorAll(".star-rating");

categorySelect.value = category;

if(!isAdmin){
categorySelect.disabled = true;
playingToggle.disabled = true;
completedToggle.disabled = true;
notesBox.disabled = true;
stars.forEach(star=>{
star.style.pointerEvents = "none";
});
}

categorySelect.addEventListener("change",()=>{
localStorage.setItem(`${key}_category`,categorySelect.value);
});

playingToggle.addEventListener("change",()=>{
localStorage.setItem(`${key}_playing`,playingToggle.checked);
loadGames();
});

completedToggle.addEventListener("change",()=>{
localStorage.setItem(`${key}_completed`,completedToggle.checked);
loadGames();
});

notesBox.addEventListener("input",()=>{
localStorage.setItem(`${key}_notes`,notesBox.value);
});

function updateStars(value){

stars.forEach(star=>{
star.style.opacity =
star.dataset.value <= value
? "1"
: "0.3";
});

}

updateStars(rating);

stars.forEach(star=>{

star.addEventListener("click",()=>{

const value = star.dataset.value;

localStorage.setItem(`${key}_rating`,value);
updateStars(value);

});

});

}

loadGames();

</script>

</body>
</html>
