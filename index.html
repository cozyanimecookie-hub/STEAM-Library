<script>

/* =========================================
   TWINKLE STARS
========================================= */

const starsContainer =
document.getElementById("stars");

for(let i=0;i<180;i++){

const star =
document.createElement("div");

star.className="star";

const size =
Math.random()*4+1;

star.style.width=
size+"px";

star.style.height=
size+"px";

star.style.left=
Math.random()*100+"%";

star.style.top=
Math.random()*100+"%";

star.style.animationDuration=
(2+Math.random()*5)+"s";

star.style.animationDelay=
Math.random()*5+"s";

const colors=[
"#ffffff",
"#fff7b0",
"#ffe680"
];

star.style.background=
colors[
Math.floor(
Math.random()*colors.length
)
];

starsContainer.appendChild(star);
}

/* =========================================
   LOAD STEAM LIBRARY
========================================= */

async function loadGames(){

const workerURL =
"https://icy-pond-784c.cozyanimecookie.workers.dev/";

try{

const response =
await fetch(workerURL);

const data =
await response.json();

const games =
data.response.games || [];

/* MAIN SECTIONS */

const playingGrid =
document.querySelector(
".playing-grid"
);

const allGrid =
document.querySelector(
".all-games-grid"
);

/* CLEAR CONTENT */

playingGrid.innerHTML="";

allGrid.innerHTML="";

/* SORT GAMES */

games.sort((a,b)=>
a.name.localeCompare(b.name)
);

/* =========================================
   CREATE GAME CARDS
========================================= */

games.forEach(game=>{

const image =
`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

const gameKey =
`game_${game.appid}`;

/* SAVED SETTINGS */

const savedPlaying =
localStorage.getItem(
`${gameKey}_playing`
)==="true";

const savedNotes =
localStorage.getItem(
`${gameKey}_notes`
)||"";

const savedRating =
localStorage.getItem(
`${gameKey}_rating`
)||"0";

const savedCategory =
localStorage.getItem(
`${gameKey}_category`
)||"Story Driven / Visual Novel";

/* CREATE CARD */

const card =
createGameCard(
game,
image,
savedCategory,
savedPlaying,
savedRating,
savedNotes,
gameKey
);

/* ADD TO ALL GAMES */

allGrid.appendChild(card);

/* CURRENTLY PLAYING */

if(savedPlaying){

const playingCard =
createGameCard(
game,
image,
savedCategory,
savedPlaying,
savedRating,
savedNotes,
gameKey
);

playingGrid.appendChild(
playingCard
);
}

});

/* =========================================
   CARD FUNCTION
========================================= */

function createGameCard(
game,
image,
savedCategory,
savedPlaying,
savedRating,
savedNotes,
gameKey
){

const card =
document.createElement("div");

card.className =
"game-card";

card.innerHTML=`

<img
src="${image}"
loading="lazy"
>

<div class="game-info">

<div class="game-title">
${game.name}
</div>

<select class="category-select">

<option
${savedCategory === "Story Driven / Visual Novel" ? "selected" : ""}
>
Story Driven / Visual Novel
</option>

<option
${savedCategory === "CozyAdventure" ? "selected" : ""}
>
CozyAdventure
</option>

<option
${savedCategory === "CozyHorror" ? "selected" : ""}
>
CozyHorror
</option>

<option
${savedCategory === "CozyCasual" ? "selected" : ""}
>
CozyCasual
</option>

<option
${savedCategory === "Multiplayer / CO-OP" ? "selected" : ""}
>
Multiplayer / CO-OP
</option>

</select>

<label>

<input
type="checkbox"
class="playing-toggle"
${savedPlaying ? "checked" : ""}
>

🎮 Currently Playing

</label>

<div class="stars-rating">

<span
class="star-rating"
data-value="1"
>⭐</span>

<span
class="star-rating"
data-value="2"
>⭐</span>

<span
class="star-rating"
data-value="3"
>⭐</span>

<span
class="star-rating"
data-value="4"
>⭐</span>

<span
class="star-rating"
data-value="5"
>⭐</span>

</div>

<textarea
class="notes-box"
placeholder="Magical cozy notes..."
>${savedNotes}</textarea>

</div>
`;

/* CATEGORY SAVE */

const categorySelect =
card.querySelector(
".category-select"
);

categorySelect.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_category`,
categorySelect.value
);

}
);

/* CURRENTLY PLAYING SAVE */

const playingToggle =
card.querySelector(
".playing-toggle"
);

playingToggle.addEventListener(
"change",
()=>{

localStorage.setItem(
`${gameKey}_playing`,
playingToggle.checked
);

location.reload();

}
);

/* NOTES SAVE */

const notesBox =
card.querySelector(
".notes-box"
);

notesBox.addEventListener(
"input",
()=>{

localStorage.setItem(
`${gameKey}_notes`,
notesBox.value
);

}
);

/* STAR RATINGS */

const stars =
card.querySelectorAll(
".star-rating"
);

function updateStars(value){

stars.forEach(star=>{

star.style.opacity =
star.dataset.value <= value
? "1"
: "0.3";

});
}

updateStars(savedRating);

stars.forEach(star=>{

star.addEventListener(
"click",
()=>{

const value =
star.dataset.value;

localStorage.setItem(
`${gameKey}_rating`,
value
);

updateStars(value);

}
);
});

return card;

}

}catch(error){

console.error(
"Steam Library Error:",
error
);

}
}

loadGames();

</script>
