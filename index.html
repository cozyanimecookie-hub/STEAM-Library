
<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CozyAnimeCookie Steam Library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      min-height: 100vh;

      overflow-x: hidden;

      background:
        radial-gradient(circle at top, #010006 40%, #6727b8 72%, #ff914d 72%);

      color: #6727b8;

      font-family: 'Magnolia', script;
    }

    .stars {

      position: fixed;

      width: 100%;

      height: 100%;

      top: 0;

      left: 0;

      pointer-events: none;

      z-index: 0;

      overflow: hidden;
    }

    .star-bg {

      position: absolute;

      width: 3px;

      height: 3px;

      background: yellow;

      border-radius: 50%;

      opacity: 0.6;

      animation:
        twinkle linear infinite;
    }

    @keyframes twinkle {

      0% {
        opacity: 0.1;
        transform: scale(0.5);
      }

      50% {
        opacity: 1;
        transform: scale(1.5);
      }

      100% {
        opacity: 0.1;
        transform: scale(0.5);
      }
    }

    .container {

      position: relative;

      z-index: 2;

      padding: 40px 28px 80px;
    }

    h1 {

      text-align: center;

      font-size: 58px;

      margin-bottom: 10px;

      font-family: 'Cinzel', serif;

      color: #fff0fb;

      text-shadow:
        0 0 12px #ffb7ea,
        0 0 32px #d8b4fe;
    }

    .subtitle {

      text-align: center;

      color: #f0c9ff;

      font-size: 18px;

      margin-bottom: 50px;
    }

    .section-title {

      margin-top: 60px;

      margin-bottom: 24px;

      font-size: 34px;

      color: #ffd2f8;

      font-family: 'Cinzel', serif;

      text-shadow: 0 0 12px #c084fc;
    }

    .game-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fill, minmax(300px, 1fr));

      gap: 28px;
    }

    .game {

      background:
        linear-gradient(
          180deg,
          rgba(255, 228, 246, 0.18),
          rgba(90, 60, 130, 0.78)
        );

      border-radius: 28px;

      overflow: hidden;

      border: 2px solid rgba(255, 214, 245, 0.38);

      box-shadow:
        0 0 24px rgba(255, 183, 234, 0.22),
        0 0 55px rgba(216, 180, 254, 0.18);

      position: relative;

      backdrop-filter: blur(10px);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .game:hover {

      transform: translateY(-6px) scale(1.02);

      box-shadow:
        0 0 24px rgba(255, 180, 255, 0.35),
        0 0 70px rgba(168, 85, 247, 0.25);
    }

    .spellbook-top {

      position: absolute;

      top: 0;

      left: 0;

      width: 100%;

      height: 8px;

      background:
        linear-gradient(
          90deg,
          #ffd6f5,
          #f9a8d4,
          #d8b4fe,
          #ffd6f5
        );
    }

    .game img {

      width: 100%;

      display: block;

      border-bottom:
        1px solid rgba(255,255,255,0.08);
    }

    .title {

      padding: 18px 18px 10px;

      font-size: 18px;

      font-weight: 600;

      color: #fff6fe;

      text-align: center;

      text-shadow: 0 0 8px rgba(255,255,255,0.2);
    }

    .controls {

      padding: 0 18px 20px;
    }

    .witch-label {

      display: flex;

      align-items: center;

      gap: 10px;

      margin-top: 12px;

      font-size: 15px;

      color: #ffe0fd;
    }

    input[type="checkbox"] {

      transform: scale(1.2);

      accent-color: #d946ef;
    }

    textarea {

      width: 100%;

      min-height: 95px;

      margin-top: 14px;

      border: 1px solid rgba(255,255,255,0.15);

      border-radius: 16px;

      background: rgba(44, 28, 70, 0.78);

      color: white;

      padding: 14px;

      resize: vertical;

      font-family: 'Fredoka', sans-serif;

      font-size: 14px;
    }

    textarea::placeholder {
      color: #d8b4fe;
    }

    select {

      width: 100%;

      margin-top: 14px;

      padding: 12px;

      border-radius: 14px;

      background: rgba(52, 33, 82, 0.9);

      color: #ffe6fc;

      border: 1px solid rgba(255,255,255,0.15);

      font-family: 'Fredoka', sans-serif;
    }

    .rating {

      margin-top: 14px;

      display: flex;

      gap: 6px;

      font-size: 26px;
    }

    .star {

      cursor: pointer;

      opacity: 0.35;

      transition:
        transform 0.15s ease,
        opacity 0.15s ease;
    }

    .star:hover {
      transform: scale(1.15);
    }

    .star.active {
      opacity: 1;
    }

    .favorites-shelf,
    .playing-shelf {

      margin-bottom: 70px;
    }

    @media (max-width: 700px) {

      h1 {
        font-size: 38px;
      }

      .section-title {
        font-size: 28px;
      }

      .container {
        padding: 26px 16px 60px;
      }
    }

  </style>

</head>

<body>

  <div class="stars" id="stars"></div>

  <div class="container">

    <h1>CozyAnimeCookie Library</h1>

    <div class="subtitle">
      Pastel anime magic • cozy gaming grimoire • dreamy witch café vibes
    </div>

    <section class="favorites-shelf">

      <h2 class="section-title">⭐ Favorite Shelf</h2>

      <div class="game-grid" id="favorites-grid"></div>

    </section>

    <section class="playing-shelf">

      <h2 class="section-title">🎮 Currently Playing</h2>

      <div class="game-grid" id="playing-grid"></div>

    </section>

    <div id="categories-container"></div>

  </div>

  <script>

    for (let i = 0; i < 120; i++) {

      const star = document.createElement('div');

      star.className = 'star-bg';

      star.style.left = Math.random() * 100 + '%';

      star.style.top = Math.random() * 100 + '%';

      star.style.animationDuration =
        (2 + Math.random() * 6) + 's';

      star.style.animationDelay =
        Math.random() * 5 + 's';

      document.getElementById('stars')
        .appendChild(star);
    }

    async function loadGames() {

      try {

        const url =
          'https://icy-pond-784c.cozyanimecookie.workers.dev/';

        const response =
          await fetch(url);

        const data =
          await response.json();

        const games =
          data.response.games || [];

        const categories = [
          'Backlog',
          'Cozy',
          'RPG',
          'Horror',
          'Multiplayer'
        ];

        const categoriesContainer =
          document.getElementById(
            'categories-container'
          );

        categories.forEach(category => {

          categoriesContainer.innerHTML += `

            <section>

              <h2 class="section-title">
                ✨ ${category}
              </h2>

              <div
                class="game-grid"
                id="category-${category}">
              </div>

            </section>
          `;
        });

        games.sort((a, b) =>
          a.name.localeCompare(b.name)
        );

        games.forEach(game => {

          const image =
            `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

          const gameKey =
            `game_${game.appid}`;

          const savedChecked =
            localStorage.getItem(
              gameKey + '_checked'
            ) === 'true';

          const savedPlaying =
            localStorage.getItem(
              gameKey + '_playing'
            ) === 'true';

          const savedNotes =
            localStorage.getItem(
              gameKey + '_notes'
            ) || '';

          const savedCategory =
            localStorage.getItem(
              gameKey + '_category'
            ) || 'Backlog';

          const savedRating =
            localStorage.getItem(
              gameKey + '_rating'
            ) || '0';

          const card =
            document.createElement('div');

          card.className = 'game';

          card.innerHTML = `

            <div class="spellbook-top"></div>

            <img src="${image}" loading="lazy">

            <div class="title">
              ${game.name}
            </div>

            <div class="controls">

              <label class="witch-label">

                <input
                  type="checkbox"
                  class="game-check"
                  ${savedChecked ? 'checked' : ''}
                >

                Completed

              </label>

              <label class="witch-label">

                <input
                  type="checkbox"
                  class="playing-check"
                  ${savedPlaying ? 'checked' : ''}
                >

                Currently Playing

              </label>

              <select class="category-select">

                <option ${savedCategory === 'Backlog' ? 'selected' : ''}>
                  Backlog
                </option>

                <option ${savedCategory === 'Cozy' ? 'selected' : ''}>
                  Cozy
                </option>

                <option ${savedCategory === 'RPG' ? 'selected' : ''}>
                  RPG
                </option>

                <option ${savedCategory === 'Horror' ? 'selected' : ''}>
                  Horror
                </option>

                <option ${savedCategory === 'Multiplayer' ? 'selected' : ''}>
                  Multiplayer
                </option>

              </select>

              <div class="rating">

                <span class="star" data-value="1">⭐</span>
                <span class="star" data-value="2">⭐</span>
                <span class="star" data-value="3">⭐</span>
                <span class="star" data-value="4">⭐</span>
                <span class="star" data-value="5">⭐</span>

              </div>

              <textarea
                class="game-notes"
                placeholder="Magical cozy gaming notes..."
              >${savedNotes}</textarea>

            </div>
          `;

          const targetCategory =
            document.getElementById(
              `category-${savedCategory}`
            );

          targetCategory.appendChild(card);

          if (savedPlaying) {

            const playingClone =
              card.cloneNode(true);

            document.getElementById(
              'playing-grid'
            ).appendChild(playingClone);
          }

          if (savedRating >= 4) {

            const favoriteClone =
              card.cloneNode(true);

            document.getElementById(
              'favorites-grid'
            ).appendChild(favoriteClone);
          }

          const checkbox =
            card.querySelector('.game-check');

          checkbox.addEventListener('change', () => {

            localStorage.setItem(
              `${gameKey}_checked`,
              checkbox.checked
            );
          });

          const playing =
            card.querySelector('.playing-check');

          playing.addEventListener('change', () => {

            localStorage.setItem(
              `${gameKey}_playing`,
              playing.checked
            );

            location.reload();
          });

          const notes =
            card.querySelector('.game-notes');

          notes.addEventListener('input', () => {

            localStorage.setItem(
              `${gameKey}_notes`,
              notes.value
            );
          });

          const category =
            card.querySelector('.category-select');

          category.addEventListener('change', () => {

            localStorage.setItem(
              `${gameKey}_category`,
              category.value
            );

            location.reload();
          });

          const stars =
            card.querySelectorAll('.star');

          function updateStars(value) {

            stars.forEach(star => {

              star.classList.toggle(
                'active',
                star.dataset.value <= value
              );
            });
          }

          updateStars(savedRating);

          stars.forEach(star => {

            star.addEventListener('click', () => {

              const value =
                star.dataset.value;

              localStorage.setItem(
                `${gameKey}_rating`,
                value
              );

              updateStars(value);

              setTimeout(() => {
                location.reload();
              }, 200);
            });
          });
        });

      } catch(error) {

        console.error(error);

        document.body.innerHTML += `
          <p style="text-align:center;">
            Error loading Steam library.
          </p>
        `;
      }
    }

    loadGames();

  </script>

</body>

</html>
```
